<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>国語</title>
  <style>
    :root { --line:#e2e8f0; --ink:#1e293b; --muted:#64748b; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--ink); background: #f8fafc;
    }
    .wrap { max-width: 760px; margin: 0 auto; padding: 14px 16px 40px; }

    /* ヘッダー（戻る＋タイトル＋ユーザー） */
    .top-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .btn-portal {
      display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600;
      color: #007aff; background: #eaf2ff; border: 1px solid #cfe0ff; border-radius: 999px;
      padding: 6px 13px; text-decoration: none; white-space: nowrap;
    }
    .btn-portal:active { background: #d7e7ff; }
    .spacer { flex: 1 1 auto; }
    .user-badge {
      display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700;
      color: #be123c; background: #ffe4e6; border: 1px solid #fecdd3; border-radius: 999px; padding: 5px 12px;
      cursor: pointer; border: none;
    }
    .user-badge .switch { font-size: 11px; font-weight: 600; color: #9f1239; opacity: .8; }

    h1.page-title { font-size: 24px; margin: 16px 2px 4px; }
    p.lead { margin: 0 2px 18px; color: var(--muted); font-size: 13px; }

    /* ユーザー未選択プロンプト */
    .user-pick {
      background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 16px;
      margin-bottom: 18px; box-shadow: 0 1px 4px rgba(0,0,0,.05);
    }
    .user-pick p { margin: 0 0 12px; font-weight: 700; font-size: 15px; }
    .user-pick .row { display: flex; gap: 12px; }
    .user-pick button {
      flex: 1; font-size: 18px; font-weight: 700; padding: 16px; border-radius: 14px;
      border: 2px solid #fecdd3; background: #fff1f2; color: #be123c; cursor: pointer;
    }
    .user-pick button:active { transform: scale(.96); }

    /* 3アプリのカード */
    .apps { display: grid; gap: 14px; grid-template-columns: 1fr; }
    @media (min-width: 560px) { .apps { grid-template-columns: 1fr 1fr 1fr; } }
    .app-card {
      display: flex; flex-direction: column; align-items: center; gap: 10px; text-decoration: none;
      background: #fff; border: 1px solid var(--line); border-radius: 18px; padding: 22px 16px;
      box-shadow: 0 1px 5px rgba(0,0,0,.06); color: var(--ink);
    }
    .app-card:active { transform: scale(.97); }
    .app-icon {
      width: 76px; height: 60px; border-radius: 16px; display: flex; align-items: center; justify-content: center;
      font-size: 32px; background: #fee2e2;
    }
    .app-name { font-size: 16px; font-weight: 800; }
    .app-desc { font-size: 12px; color: var(--muted); text-align: center; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-bar">
      <a class="btn-portal" href="https://komaguchi-wq.github.io/study-portal/">🏠 学習ポータルTOPへ</a>
      <span class="spacer"></span>
      <button id="userBadge" class="user-badge" style="display:none;" onclick="switchUser()">
        <span>👤 <span id="userName"></span></span><span class="switch">切替</span>
      </button>
    </div>

    <h1 class="page-title">📖 国語</h1>
    <p class="lead">使うアプリを選んでください。</p>

    <div id="userPick" class="user-pick" style="display:none;">
      <p>だれが使う？</p>
      <div class="row">
        <button onclick="pickUser('さと')">さと</button>
        <button onclick="pickUser('ぱぱ')">ぱぱ</button>
      </div>
    </div>

    <div class="apps">
      <a class="app-card" href="https://komaguchi-wq.github.io/kokugo-kotobanavi/">
        <span class="app-icon">📖</span>
        <span class="app-name">言葉ナビ</span>
        <span class="app-desc">ことわざ・慣用句・<br>四字熟語</span>
      </a>
      <a class="app-card" href="https://komaguchi-wq.github.io/goi1400-training/">
        <span class="app-icon">📝</span>
        <span class="app-name">語彙力1400</span>
        <span class="app-desc">語彙力トレーニング</span>
      </a>
      <a class="app-card" href="https://komaguchi-wq.github.io/kokugo-weekly-sapix/">
        <span class="app-icon">📚</span>
        <span class="app-name">Weekly SapiX</span>
        <span class="app-desc">読解（大問別）</span>
      </a>
    </div>
  </div>

  <script>
    // 全アプリ共通の端末ユーザー記憶（同一オリジン komaguchi-wq.github.io の localStorage を共有）
    var STUDY_USER_KEY = 'study-user';
    function renderUser() {
      var u = localStorage.getItem(STUDY_USER_KEY);
      var badge = document.getElementById('userBadge');
      var pick = document.getElementById('userPick');
      if (u === 'さと' || u === 'ぱぱ') {
        document.getElementById('userName').textContent = u;
        badge.style.display = '';
        pick.style.display = 'none';
      } else {
        badge.style.display = 'none';
        pick.style.display = '';
      }
    }
    function pickUser(u) { localStorage.setItem(STUDY_USER_KEY, u); renderUser(); }
    function switchUser() { localStorage.removeItem(STUDY_USER_KEY); renderUser(); }
    renderUser();
  </script>
</body>
</html>
